/* ── helpers ── */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});},{threshold:.1});
    els.forEach(el=>io.observe(el));
    return()=>io.disconnect();
  },[]);
}

/* ── Ambient Network Canvas (low opacity) ── */
const AmbientNetwork=({style={}})=>{
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    let raf,t=0;
    const nodes=[{x:.15,y:.3},{x:.35,y:.15},{x:.55,y:.4},{x:.75,y:.2},{x:.85,y:.6},{x:.4,y:.7},{x:.65,y:.8},{x:.2,y:.6}];
    const edges=[[0,1],[1,2],[2,3],[3,4],[2,5],[5,6],[4,6],[0,7],[7,5]];
    const pkts=[{e:0,t:0,spd:.003,col:'#22d3ee'},{e:2,t:.5,spd:.002,col:'#f97316'},{e:6,t:.2,spd:.0025,col:'#22d3ee'}];
    const W=()=>canvas.width,H=()=>canvas.height;
    const p=n=>({x:nodes[n].x*W(),y:nodes[n].y*H()});
    const resize=()=>{canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;};
    resize();window.addEventListener('resize',resize);
    const draw=()=>{
      ctx.clearRect(0,0,W(),H());
      edges.forEach(([a,b])=>{const pa=p(a),pb=p(b);ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.strokeStyle='rgba(34,211,238,0.06)';ctx.lineWidth=.8;ctx.stroke();});
      pkts.forEach(pk=>{
        const prog=((t*pk.spd+pk.t)%1);
        const [a,b]=edges[pk.e];
        const pa=p(a),pb=p(b);
        const px=pa.x+(pb.x-pa.x)*prog,py=pa.y+(pb.y-pa.y)*prog;
        ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);
        ctx.fillStyle=pk.col+'55';ctx.fill();
      });
      t++;raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.55,pointerEvents:'none',...style}}/>;
};

            const isCyan=i>=whiteCount;

          {/* Ghost CTA with animated play */}

            onMouseOut={e=>{e.currentTarget.style.borderColor='rgba(240,244,255,.2)';e.currentTarget.style.transform='none';}}>

/* ── Count-up stat ── */
const Stat=({value,label,sub,color,ring,delay})=>{
  const [count,setCount]=useState(0);
  const ref=useRef(null);
  const numericVal=parseInt(value.replace(/[^0-9]/g,''));
  const suffix=value.replace(/[0-9,]/g,'');
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const io=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){
        io.unobserve(el);
        let start=0;const dur=1200;const startTime=performance.now();
        const step=ts=>{const p=Math.min((ts-startTime)/dur,1);setCount(Math.round(p*numericVal));if(p<1)requestAnimationFrame(step);};
        requestAnimationFrame(step);
      }
    },{threshold:.3});
    io.observe(el);
    return()=>io.disconnect();
  },[numericVal]);
  const circumference=2*Math.PI*22;
  const pct=ring||0;
  return(
    <div ref={ref} className={`reveal d${delay}`} style={{padding:'1.5rem 1.75rem',background:C.bg,textAlign:'center',position:'relative',overflow:'hidden'}}>
      {ring&&(
        <svg style={{position:'absolute',top:8,right:8,opacity:.18}} width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="22" fill="none" stroke={color} strokeWidth="2" strokeDasharray={circumference} strokeDashoffset={circumference*(1-pct/100)} strokeLinecap="round" transform="rotate(-90 26 26)"
            style={{transition:'stroke-dashoffset 1.2s ease-out'}}/>
        </svg>
      )}
      <div style={{fontSize:'2.25rem',fontWeight:900,letterSpacing:'-0.04em',color,marginBottom:'.25rem',fontFamily:"'Inter Tight',sans-serif"}}>
        {count.toLocaleString()}{suffix}
      </div>
      <div style={{fontSize:'13px',fontWeight:600,color:C.white,marginBottom:'.2rem'}}>{label}</div>
      <div style={{fontSize:'10px',color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>{sub}</div>
    </div>
  );
};

/* ── Simulation Showcase ── */
const SimulationShowcase=()=>{
  const canvasRef=useRef(null);
  const [speed,setSpeed]=useState(1);
  const [paused,setPaused]=useState(false);
  const pausedRef=useRef(false);
  const speedRef=useRef(1);
  useEffect(()=>{pausedRef.current=paused;},[paused]);
  useEffect(()=>{speedRef.current=speed;},[speed]);
  const [stats,setStats]=useState({sent:0,acks:0,throughput:'0.0',rtt:42});

  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    let raf,t=0;
    const nodes=[{id:'src',x:.1,y:.5,label:'Client'},{id:'r1',x:.3,y:.25,label:'Router A'},{id:'r2',x:.3,y:.75,label:'Router B'},{id:'r3',x:.55,y:.15,label:'Router C'},{id:'r4',x:.55,y:.5,label:'Switch'},{id:'r5',x:.55,y:.85,label:'Router D'},{id:'dst',x:.85,y:.5,label:'Server'}];
    const edges=[['src','r1'],['src','r2'],['r1','r3'],['r1','r4'],['r2','r4'],['r2','r5'],['r3','dst'],['r4','dst'],['r5','dst']];
    const pktDefs=[{path:['src','r1','r3','dst'],col:'#22d3ee',off:0,spd:.003},{path:['src','r2','r4','dst'],col:'#f97316',off:.33,spd:.0025},{path:['src','r1','r4','dst'],col:'#818cf8',off:.66,spd:.0035}];
    const nb=id=>nodes.find(n=>n.id===id);
    const W=()=>canvas.width,H=()=>canvas.height;
    const p=n=>({x:n.x*W(),y:n.y*H()});
    let sc=0;
    const draw=()=>{
      ctx.clearRect(0,0,W(),H());
      ctx.strokeStyle='rgba(34,211,238,.03)';ctx.lineWidth=.8;
      for(let i=0;i<W();i+=28){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H());ctx.stroke();}
      for(let i=0;i<H();i+=28){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W(),i);ctx.stroke();}
      edges.forEach(([a,b])=>{const pa=p(nb(a)),pb=p(nb(b));ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.strokeStyle='rgba(34,211,238,.11)';ctx.lineWidth=1;ctx.stroke();});
      pktDefs.forEach(pk=>{
        const prog=((t*pk.spd*speedRef.current+pk.off)%1);
        const segs=pk.path.length-1;
        const tot=prog*segs;const seg=Math.min(Math.floor(tot),segs-1);const sT=tot-seg;
        const a=p(nb(pk.path[seg])),b=p(nb(pk.path[seg+1]));
        const px=a.x+(b.x-a.x)*sT,py=a.y+(b.y-a.y)*sT;
        const grd=ctx.createRadialGradient(px,py,0,px,py,13);
        grd.addColorStop(0,pk.col+'77');grd.addColorStop(1,'transparent');
        ctx.fillStyle=grd;ctx.beginPath();ctx.arc(px,py,13,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(px,py,3.5,0,Math.PI*2);ctx.fillStyle=pk.col;ctx.fill();
      });
      nodes.forEach(n=>{
        const {x,y}=p(n);const ep=n.id==='src'||n.id==='dst';
        ctx.beginPath();ctx.arc(x,y,11,0,Math.PI*2);ctx.strokeStyle=ep?'rgba(34,211,238,.42)':'rgba(34,211,238,.16)';ctx.lineWidth=1.5;ctx.stroke();
        ctx.fillStyle=ep?'rgba(34,211,238,.1)':'rgba(34,211,238,.04)';ctx.fill();
        ctx.font="9px 'JetBrains Mono',monospace";ctx.fillStyle='rgba(34,211,238,.5)';ctx.textAlign='center';ctx.fillText(n.label,x,y+26);
      });
      if(!pausedRef.current){t++;if(t%55===0){sc++;setStats({sent:sc*3,acks:sc*3-1,throughput:(1.1+Math.random()*.4).toFixed(1),rtt:36+Math.round(Math.random()*14)});}}
      raf=requestAnimationFrame(draw);
    };
    const resize=()=>{canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;};
    resize();window.addEventListener('resize',resize);draw();
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);

  return(
    <section style={{padding:'6rem 2.5rem',background:C.bgAlt,borderTop:`1px solid ${C.border}`,position:'relative',overflow:'hidden'}}>
      <AmbientNetwork style={{opacity:.05}}/>
      <div style={{maxWidth:'1200px',margin:'0 auto',position:'relative',zIndex:1}}>
        <p className="reveal" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'10px',letterSpacing:'.15em',textTransform:'uppercase',color:C.amber,marginBottom:'.8rem'}}>LEARN BY DOING</p>
        <h2 className="reveal d1" style={{fontFamily:"'Inter Tight',sans-serif",fontSize:'clamp(1.9rem,3.5vw,3rem)',fontWeight:900,letterSpacing:'-0.04em',color:C.white,marginBottom:'2.75rem',lineHeight:1.05}}>Simulations that make concepts click.</h2>
        <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:'2.75rem',alignItems:'start'}}>
          <div>

                </div>
                <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <select value={speed} onChange={e=>setSpeed(Number(e.target.value))} style={{background:'rgba(255,255,255,.05)',border:`1px solid ${C.border}`,color:C.white,borderRadius:'3px',padding:'2px 4px',fontSize:'10px',fontFamily:"'JetBrains Mono',monospace",cursor:'pointer'}}>

                  <button onClick={()=>setPaused(p=>!p)} style={{padding:'3px 9px',background:'rgba(34,211,238,.07)',border:`1px solid rgba(34,211,238,.18)`,borderRadius:'3px',color:C.cyan,fontSize:'10px',fontFamily:"'JetBrains Mono',monospace",cursor:'pointer'}}>{paused?'▶ Play':'⏸ Pause'}</button>

              </div>
              {/* Canvas + stats */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 130px'}}>
                <div style={{position:'relative',aspectRatio:'16/9'}}>
                  <canvas ref={canvasRef} style={{width:'100%',height:'100%',display:'block'}}/>

                  </div>
                  <div style={{position:'absolute',bottom:'8px',left:'8px',display:'flex',gap:'8px'}}>
                    {[['#22d3ee','Path A'],['#f97316','Path B'],['#818cf8','Path C']].map(([col,lbl])=>(
                      <div key={lbl} style={{display:'flex',alignItems:'center',gap:'3px'}}>
                        <div style={{width:5,height:5,borderRadius:'50%',background:col}}/>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'8px',color:'rgba(240,244,255,.3)'}}>{lbl}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{padding:'.875rem',borderLeft:`1px solid ${C.border}`,display:'flex',flexDirection:'column',gap:'11px',justifyContent:'center'}}>
                  {[['Packets Sent',stats.sent],['ACKs Received',stats.acks],['Throughput',`${stats.throughput} Mbps`],['RTT (avg)',`${stats.rtt} ms`]].map(([lbl,val])=>(
                    <div key={lbl}><div style={{fontSize:'8px',fontFamily:"'JetBrains Mono',monospace",color:C.muted,marginBottom:'1px',letterSpacing:'.03em'}}>{lbl}</div><div style={{fontSize:'15px',fontWeight:800,letterSpacing:'-0.03em',color:C.white}}>{val}</div></div>
                  ))}
                </div>
              </div>
            </div>
            {/* Sim strip */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'7px',marginTop:'8px'}}>
              {['Routing & Shortest Path','UDP vs TCP','Congestion Control','DNS Resolution'].map((t,i)=>(
                <div key={t} style={{border:`1px solid ${i===0?'rgba(34,211,238,.22)':C.border}`,borderRadius:'7px',padding:'.6rem .75rem',background:i===0?'rgba(34,211,238,.04)':C.bgCard,cursor:'pointer',transition:'border-color .2s,background .2s'}}

                  onMouseOut={e=>{if(i!==0){e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.bgCard;}}}>
                  <div style={{fontSize:'8px',fontFamily:"'JetBrains Mono',monospace",color:C.amber,marginBottom:'2px',letterSpacing:'.05em'}}>Lab {i+1}.{i+1}</div>
                  <div style={{fontSize:'10px',fontWeight:600,color:i===0?C.white:'rgba(240,244,255,.45)',lineHeight:1.3}}>{t}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
};
